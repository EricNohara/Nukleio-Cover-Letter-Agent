name: Deploy Lambda

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "apps/coverLetterAgent/**"
      - ".github/workflows/deployCoverLetterAgent.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/coverLetterAgent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install runtime dependencies only
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Prepare deployment package
        run: |
          rm -rf package function.zip
          npm ci --omit=dev
          mkdir package
          cp -r dist/* package/
          cp package.json package/
          cp -r node_modules package/
          cd package
          zip -r ../function.zip .

      - name: Deploy to AWS Lambda
        uses: appleboy/lambda-action@v0.2.0
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ secrets.AWS_REGION }}
          function_name: ${{ github.ref_name == 'main' && 'Nukleio-Cover-Letter-Agent' || 'Nukleio-Cover-Letter-Agent-Dev' }}
          zip_file: apps/coverLetterAgent/function.zip
          runtime: nodejs20.x
          handler: dist/index.handler
          memory_size: 1536
          timeout: 900
